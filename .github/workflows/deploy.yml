name: NodeJS Application 

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Deploy Via SSH
      uses: appleboy/ssh-action@1.0.3
    with:
      host: ${{ secrets.SSH_HOST }}
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: root
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /root/NodeJS_App
          git pull 
          docker-compose up -d --build